<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculadora Simples</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="main-header">
      <h1>CALCULADORA SIMPLES</h1>
    </header>

    <section class="about-section">
      <div class="container about-content">
        <img
          src="fotos_calculadora/foto_main.jpeg"
          alt="Ilustração tecnologia"
          class="about-img"
        />
        <div class="about-text">
          <h2>SOBRE</h2>
          <p>
            CRIADA PARA TESTAR CONHECIMENTOS BÁSICOS EM PROGRAMAÇÃO, POR MIGUEL
            SILVA DA COSTA, COM FOCO EM RESOLVER CÁLCULOS ARITMÉTICOS SIMPLES,
            COMO SOMA, SUBTRAÇÃO, MULTIPLICAÇÃO E DIVISÃO.
          </p>
        </div>
      </div>
    </section>

    <main class="calc-section">
      <h2>CALCULADORA</h2>
      <div class="inputs-group">
        <input type="number" id="primeiro_numero" class="calc-input">
        <input type="number" id="segundo_numero" class="calc-input">
      </div>
      <div class="buttons-group">
        <button onclick="somar()">SOMAR</button>
        <button onclick="subtrair()">SUBTRAIR</button>
        <button onclick="multiplicar()">MULTIPLICAR</button>
        <button onclick="dividir()">DIVIDIR</button>
      </div>

      <div class="result-container">
        <h3>RESULTADO:</h3>
        <div class="result-display" id="resultado"></div>
      </div>
    </main>

    <footer class="contact-section">
      <div class="container">
        <h2>CONTATO</h2>
        <nav class="links-list">
          <a href="https://www.linkedin.com/in/miguel-costa-7087b3384/" target="_blank"><i class="fa-brands fa-linkedin"></i> LINKEDIN</a>
          <a href="https://github.com/migueelCosta" target="_blank"><i class="fa-brands fa-github"></i> GITHUB</a>
          <p><i class="fa-solid fa-envelope"></i>miguelsilvaccosta@gmail.com</p>
  
          
        </nav>
      </div>
    </footer>
    <script src="script.js"></script>
  </body>
</html>
